name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: |
          $tag = git describe --tags --abbrev=0
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore src/iNeedMyMoneyBack.sln

      - name: Build Release
        run: msbuild src/iNeedMyMoneyBack.sln -p:Configuration=Release -v:minimal

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: src/bin/Release/iNeedMyMoneyBack.exe
